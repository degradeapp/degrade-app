name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Espelha o dev: suíte inteira em SQLite :memory: + lint + build do front
  sqlite:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, pdo_sqlite
          coverage: none

      - name: Dependências PHP
        run: composer install --no-interaction --no-progress

      - name: .env de teste
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Formatação (Pint)
        run: composer lint:check

      - name: Testes (SQLite)
        run: php artisan test

      - name: Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Dependências JS
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Build do frontend
        run: npm run build

  # Espelha a produção: migra uma base VAZIA e roda a suíte inteira em Postgres
  # (pega diferença SQLite vs Postgres: varchar imposto, formato de TIME, LIKE...)
  pgsql:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: degrade
          POSTGRES_PASSWORD: degrade
          POSTGRES_DB: degrade_ci
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: '5432'
      DB_DATABASE: degrade_ci
      DB_USERNAME: degrade
      DB_PASSWORD: degrade

    steps:
      - uses: actions/checkout@v4

      - name: PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, pdo_pgsql
          coverage: none

      - name: Dependências PHP
        run: composer install --no-interaction --no-progress

      - name: .env de teste
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Migração completa numa base vazia
        run: php artisan migrate --force

      - name: Testes (PostgreSQL)
        run: php artisan test
