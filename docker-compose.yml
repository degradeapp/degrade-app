version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: degrade_app
    restart: unless-stopped
    working_dir: /app
    environment:
      - APP_ENV=${APP_ENV}
      - APP_KEY=${APP_KEY}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - degrade
    command: php artisan serve --host=0.0.0.0

  nginx:
    image: nginx:alpine
    container_name: degrade_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/app
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - degrade

  postgres:
    image: postgres:16-alpine
    container_name: degrade_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - degrade

  redis:
    image: redis:7-alpine
    container_name: degrade_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - degrade

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: degrade_queue
    restart: unless-stopped
    working_dir: /app
    environment:
      - APP_ENV=${APP_ENV}
      - APP_KEY=${APP_KEY}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
    networks:
      - degrade
    command: php artisan queue:work

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: degrade_scheduler
    restart: unless-stopped
    working_dir: /app
    environment:
      - APP_ENV=${APP_ENV}
      - APP_KEY=${APP_KEY}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
    networks:
      - degrade
    command: php artisan schedule:work

  node:
    image: node:20-alpine
    container_name: degrade_node
    working_dir: /app
    volumes:
      - .:/app
    networks:
      - degrade
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

networks:
  degrade:
    driver: bridge
